; ============================================================
; Travel Jellyfin CYD — PlatformIO config
; ESP32-3248S035R (3.5" resistive touch, ST7796 + XPT2046)
; ============================================================
;
; TFT_eSPI requires a custom User_Setup.h to know our pinout.
; The file "User_Setup.h" in this folder is automatically picked
; up by TFT_eSPI when you set TFT_eSPI as a library with the
; build flag below. If PlatformIO can't find it, copy it to:
;   ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32/
; or use the Arduino IDE and select "User_Setup.h" from this folder
; in File > Preferences > TFT_eSPI > User Setup File.

[env:esp32dev]
platform          = espressif32@6.7.0
board             = esp32dev
framework         = arduino
monitor_speed     = 115200
upload_speed      = 921600

build_flags =
  -DUSER_SETUP_LOADED=1
  -include "User_Setup.h"
  -std=gnu++17

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.1.0