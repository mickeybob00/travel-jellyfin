; ESP32 Cheap Yellow Display platformio.ini
; For use with PlatformIO build system

[env:esp32cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    paulstoffregen/XPT2046_Touchscreen@^1.4.0
    bblanchon/ArduinoJson@^6.21.0
build_flags = 
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=5
    -DSPI_FREQUENCY=55000000
    -DSPI_TOUCH_FREQUENCY=2500000